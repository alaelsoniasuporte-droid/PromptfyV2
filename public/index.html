<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Promptfy PRO</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'DM Sans';
  background:#000;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh
}

.card{
  background:#111;
  padding:40px;
  border-radius:16px;
  text-align:center;
  width:360px;
  border:1px solid rgba(245,196,0,.3)
}

.btn{
  margin-top:20px;
  padding:14px;
  width:100%;
  border:none;
  border-radius:8px;
  cursor:pointer
}

.gold{
  background:#f5c400;
  color:#000;
  font-weight:700
}

#welcome{display:none}

.badge{
  margin-top:10px;
  font-size:12px;
  padding:6px 10px;
  border-radius:20px;
  display:inline-block
}

.free{
  background:#333;
  color:#aaa
}

.premium{
  background:#f5c400;
  color:#000;
  font-weight:700
}

.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.9);
  align-items:center;
  justify-content:center
}

.modal.on{display:flex}

.modal-box{
  background:#111;
  padding:30px;
  border-radius:12px;
  text-align:center
}
</style>
</head>

<body>

<div class="card" id="login">
  <h2>PROMPTFY</h2>
  <button class="btn gold" id="googleLogin">Entrar com Google</button>
</div>

<div class="card" id="welcome">
  <h2>Bem-vindo</h2>
  <p id="userName"></p>
  <div id="status" class="badge free">Plano Free</div>
  <button class="btn gold" onclick="gerarPrompt()">Gerar Prompt</button>
</div>

<div class="modal" id="payModal">
  <div class="modal-box">
    <h3>Liberar acesso</h3>
    <p>Assine por R$19,90/mês</p>
    <button class="btn gold" onclick="assinar()">Assinar</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD8tX4TLqF149IWkBv4iiuigysMDUmyc4E",
  authDomain: "promptfy-6342c.firebaseapp.com",
  projectId: "promptfy-6342c",
  storageBucket: "promptfy-6342c.firebasestorage.app",
  messagingSenderId: "699700457212",
  appId: "1:699700457212:web:6fe921f7754fcc39133179"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();
const db = getFirestore(app);

let currentUserId = null;
let userData = null;

document.getElementById("googleLogin").addEventListener("click", async () => {
  const result = await signInWithPopup(auth, provider);
  const user = result.user;
  currentUserId = user.uid;

  const ref = doc(db, "usuarios", user.uid);
  const snap = await getDoc(ref);

  if(!snap.exists()){
    await setDoc(ref, {
      nome: user.displayName,
      email: user.email,
      prompts: 0,
      premium: false
    });
  }

  document.getElementById("login").style.display = "none";
  document.getElementById("welcome").style.display = "block";
  document.getElementById("userName").textContent = user.displayName;

  // 🔥 atualização em tempo real
  onSnapshot(ref, (docSnap) => {
    userData = docSnap.data();

    if(userData.premium){
      document.getElementById("status").textContent = "Plano Premium";
      document.getElementById("status").className = "badge premium";
    } else {
      document.getElementById("status").textContent =
        "Plano Free (" + userData.prompts + "/4)";
      document.getElementById("status").className = "badge free";
    }
  });
});

// gerar prompt
window.gerarPrompt = async function(){
  if(!userData) return;

  if(userData.premium){
    alert("Prompt gerado (premium)");
    return;
  }

  if(userData.prompts >= 4){
    document.getElementById("payModal").classList.add("on");
    return;
  }

  const newCount = userData.prompts + 1;

  await updateDoc(doc(db, "usuarios", currentUserId), {
    prompts: newCount
  });

  alert("Prompt gerado! Total: " + newCount);
}

// pagamento
window.assinar = function(){
  window.open("https://pay.kiwify.com.br/Aab7Fdv","_blank");
}
</script>

</body>
</html>
